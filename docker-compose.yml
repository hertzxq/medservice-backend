services:
  postgres:
    image: postgres:16-alpine
    container_name: medservice_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medservice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-medservice_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medservice_user -d medservice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: medservice_postgres_data
