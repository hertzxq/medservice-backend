services:
  postgres:
    image: postgres:16-alpine
    container_name: medservice_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: medservice-backend/Dockerfile
    image: medservice-backend:prod
    container_name: medservice_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    # Порт 8000 на хост НЕ публикуется: снаружи API доступен только через
    # caddy (TLS на API_DOMAIN), внутри compose-сети caddy ходит на backend:8000.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Review-verification scheduler: periodically re-scrapes platforms and flips
  # pending publish-claims to verified (and stale ones to not_found). Reuses the
  # backend image (it has the parsers venv + playwright browsers). Without this,
  # the verification gate never opens in production.
  verify:
    image: medservice-backend:prod
    container_name: medservice_verify
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    # Override the API entrypoint: run the scrape+match loop instead of gunicorn.
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        echo "[verify] scheduler started (every ${VERIFY_INTERVAL_SECONDS:-1800}s)";
        # Give the backend time to apply migrations on first boot.
        sleep 30;
        while true; do
          python scripts/verify_reviews.py --scrape || echo "[verify] run failed (will retry)";
          sleep "${VERIFY_INTERVAL_SECONDS:-1800}";
        done
    restart: unless-stopped

  # TLS для API на этом же сервере (между серверами нет приватной сети, поэтому
  # токены/телефоны не должны ходить открытым HTTP). DNS API_DOMAIN -> этот хост.
  caddy:
    image: caddy:2-alpine
    container_name: medservice_api_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
    name: medservice_postgres_prod_data
  caddy_data:
    name: medservice_api_caddy_data
  caddy_config:
    name: medservice_api_caddy_config
